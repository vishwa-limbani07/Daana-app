<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Rounded square gradient background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Stylized heart — universal symbol for giving -->
  <path
    d="M32 50 C 18 40, 11 30, 17 21 C 22 15, 28 17, 32 22 C 36 17, 42 15, 47 21 C 53 30, 46 40, 32 50 Z"
    fill="url(#heartGrad)"
  />

  <!-- Spark accent — represents momentum / new beginnings -->
  <circle cx="49" cy="16" r="3" fill="white" opacity="0.95"/>
</svg>
